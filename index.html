<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Student Management System✨</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <script>
      if (localStorage.getItem("login") !== "true") {
        window.location.href = "login.html";
      }
    </script>

    <!-- Navbar -->
    <div class="navbar">
      <h3>SMS Dashboard</h3>
      <button onclick="logout()" style="background: red; color: white">
        Logout
      </button>
    </div>

    <!-- Total Students -->
    <div class="total-box">
      <div class="total-box">
        <h3>👩‍🎓Total Students</h3>
        <p id="totalStudents">0</p>
      </div>
    </div>

    <div class="container">
      <h2>Student Management System</h2>

      <!-- Form -->
      <div class="form-box">
        <h3>✨ Add Student</h3>
        <h3>📋 Student List</h3>

        <div class="form-group">
          <input type="text" id="name" placeholder="Enter Name" />
          <input type="email" id="email" placeholder="Enter Email" />
          <input type="text" id="course" placeholder="Enter Course" />
          <input type="text" id="phone" placeholder="Enter Phone" />
        </div>
        <br /><br />

        <button type="button" onclick="addStudent()">Save Student</button>
      </div>
      <input
        type="text"
        id="search"
        placeholder="Search student..."
        onkeyup="searchStudent()"
        style="
          width: 100%;
          padding: 10px;
          margin: 10px 0;
          border-radius: 8px;
          border: 1px solid #ccc;
        "
      />
      <!-- Table -->
      <table border-radius="1" width="100%" style="margin-top: 20px">
        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Course</th>
            <th>Phone</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="studentTable"></tbody>
      </table>
    </div>

    <script src="script.js"></script>

    <script>
      function logout() {
        localStorage.removeItem("login");
        window.location.href = "login.html";
      }
    </script>
  </body>
</html>
